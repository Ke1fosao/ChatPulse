name: Finalize Owner Revenue metrics

on:
  pull_request:

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'feat/owner-revenue'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Patch comprehensive revenue metrics
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('app/repositories/owner_revenue.py')
          text = path.read_text()
          text = text.replace(
              'from app.billing_models import VipInvoiceIntent, VipPayment, VipTrialClaim\n',
              'from app.billing_models import VipInvoiceIntent, VipPayment\nfrom app.vip_product_models import VipProductEvent\n',
          )
          text = text.replace(
              '            intents = {\n                int(row.id): row\n                for row in (\n                    await session.scalars(select(VipInvoiceIntent))\n                ).all()\n            }\n',
              '            intent_rows = list((await session.scalars(select(VipInvoiceIntent))).all())\n            intents = {int(row.id): row for row in intent_rows}\n            product_events = list((await session.scalars(select(VipProductEvent))).all())\n',
          )
          marker = '        stars = sum(int(row.stars_amount) for row in paid)\n        return {\n'
          replacement = '''        stars = sum(int(row.stars_amount) for row in paid)\n        stars_today = sum(\n            int(row.stars_amount)\n            for row in all_paid\n            if _as_utc(row.paid_at).date() == current.date()\n        )\n        stars_7d = sum(\n            int(row.stars_amount)\n            for row in all_paid\n            if _as_utc(row.paid_at) >= current - timedelta(days=7)\n        )\n        stars_30d = sum(\n            int(row.stars_amount)\n            for row in all_paid\n            if _as_utc(row.paid_at) >= current - timedelta(days=30)\n        )\n        stars_all_time = sum(int(row.stars_amount) for row in all_paid)\n        preview_users = {\n            int(row.telegram_user_id)\n            for row in product_events\n            if row.event_type in {"vip_viewed", "vip_feature_previewed"}\n            and _as_utc(row.created_at) >= start\n        }\n        trial_invoice_users = {\n            int(row.telegram_user_id)\n            for row in intent_rows\n            if row.product_code == "trial_7d" and _as_utc(row.created_at) >= start\n        }\n        return {\n'''
          if marker not in text:
              raise SystemExit('summary marker not found')
          text = text.replace(marker, replacement)
          text = text.replace(
              '            "period_days": days,\n            "stars": stars,\n',
              '            "period_days": days,\n            "stars": stars,\n            "stars_today": stars_today,\n            "stars_7d": stars_7d,\n            "stars_30d": stars_30d,\n            "stars_all_time": stars_all_time,\n',
          )
          text = text.replace(
              '            "trial_paid": len(trial_users),\n',
              '            "trial_previews": len(preview_users),\n            "trial_invoices": len(trial_invoice_users),\n            "trial_paid": len(trial_users),\n',
          )
          path.write_text(text)

          path = Path('miniapp/src/owner/types.ts')
          text = path.read_text()
          text = text.replace(
              '  stars: number;\n  payments: number;\n',
              '  stars: number;\n  stars_today: number;\n  stars_7d: number;\n  stars_30d: number;\n  stars_all_time: number;\n  payments: number;\n',
          )
          text = text.replace(
              '  trial_paid: number;\n',
              '  trial_previews: number;\n  trial_invoices: number;\n  trial_paid: number;\n',
          )
          path.write_text(text)

          path = Path('miniapp/src/owner/OwnerPayments.tsx')
          text = path.read_text()
          old = '''    return [\n      { label: `Stars · ${days} дн.`, value: `${summary.stars} ⭐`, note: `${summary.payments} оплат`, icon: Star },\n      { label: "MRR", value: `${summary.mrr_stars} ⭐`, note: `${summary.active_subscriptions} підписок`, icon: RotateCcw },\n      { label: "ARPPU", value: `${summary.arppu_stars} ⭐`, note: `${summary.unique_payers} платників`, icon: Users },\n      { label: "Trial → paid", value: `${summary.trial_conversion_percent}%`, note: `${summary.trial_converted}/${summary.trial_paid}`, icon: ArrowUpRight },\n      { label: "Повернення", value: `${summary.refunded_stars} ⭐`, note: `${summary.refunds} операцій`, icon: ArrowDownRight },\n      { label: "VIP завершується", value: summary.expiring_7d, note: "у наступні 7 днів", icon: CalendarClock },\n    ];\n'''
          new = '''    return [\n      { label: "Stars сьогодні", value: `${summary.stars_today} ⭐`, note: "успішні оплати", icon: Star },\n      { label: "Stars · 7 днів", value: `${summary.stars_7d} ⭐`, note: "чистий дохід", icon: ArrowUpRight },\n      { label: "Stars · 30 днів", value: `${summary.stars_30d} ⭐`, note: `${summary.payments} оплат у фільтрі`, icon: CircleDollarSign },\n      { label: "Stars · весь час", value: `${summary.stars_all_time} ⭐`, note: "без повернених", icon: WalletCards },\n      { label: "MRR", value: `${summary.mrr_stars} ⭐`, note: `${summary.active_subscriptions} підписок`, icon: RotateCcw },\n      { label: "ARPPU", value: `${summary.arppu_stars} ⭐`, note: `${summary.unique_payers} платників`, icon: Users },\n      { label: "Trial → paid", value: `${summary.trial_conversion_percent}%`, note: `${summary.trial_previews} preview · ${summary.trial_invoices} invoice · ${summary.trial_converted} paid`, icon: ArrowUpRight },\n      { label: "Повернення", value: `${summary.refunded_stars} ⭐`, note: `${summary.refunds} операцій`, icon: ArrowDownRight },\n      { label: "VIP завершується", value: summary.expiring_7d, note: "у наступні 7 днів", icon: CalendarClock },\n    ];\n'''
          if old not in text:
              raise SystemExit('frontend metrics marker not found')
          path.write_text(text.replace(old, new))

          path = Path('miniapp/src/owner/OwnerPayments.test.tsx')
          text = path.read_text()
          text = text.replace(
              '    stars: 208,\n    payments: 4,\n',
              '    stars: 208,\n    stars_today: 59,\n    stars_7d: 208,\n    stars_30d: 208,\n    stars_all_time: 350,\n    payments: 4,\n',
          )
          text = text.replace(
              '    trial_paid: 2,\n',
              '    trial_previews: 5,\n    trial_invoices: 2,\n    trial_paid: 2,\n',
          )
          text = text.replace(
              '  expect(await screen.findByText("208 ⭐")).toBeInTheDocument();\n',
              '  expect(await screen.findAllByText("208 ⭐")).toHaveLength(2);\n  expect(screen.getByText("350 ⭐")).toBeInTheDocument();\n',
          )
          path.write_text(text)
          PY
      - run: pip install -q ruff
      - run: ruff format app tests
      - name: Remove patch workflow and commit
        run: |
          rm .github/workflows/owner-revenue-patch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "feat: complete Owner Revenue metrics"
          git push origin HEAD:${{ github.head_ref }}
