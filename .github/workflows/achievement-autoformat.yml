name: Achievement autoformat

on:
  push:
    branches:
      - feat/achievements-showcase-v3

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/achievements-showcase-v3
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -q ruff
      - name: Format changed Python files
        run: |
          ruff format app/api/miniapp/featured.py app/repositories/gamification_v2.py app/services/profile_cards.py
          ruff check --fix app/api/miniapp/featured.py app/repositories/gamification_v2.py app/services/profile_cards.py
      - name: Commit formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/api/miniapp/featured.py app/repositories/gamification_v2.py app/services/profile_cards.py
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "style: format achievement backend"
          git push origin HEAD:feat/achievements-showcase-v3
