name: Achievement release finalizer

on:
  push:
    branches:
      - feat/achievements-showcase-v3

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/achievements-showcase-v3
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -q ruff
      - name: Format and bump release
        run: |
          ruff format app/api/miniapp/featured.py app/repositories/gamification_v2.py app/services/profile_cards.py
          ruff check --fix app/api/miniapp/featured.py app/repositories/gamification_v2.py app/services/profile_cards.py
          sed -i 's/0.11.0/0.12.0/g' app/main.py pyproject.toml miniapp/package.json
      - name: Commit release metadata
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/api/miniapp/featured.py app/repositories/gamification_v2.py app/services/profile_cards.py app/main.py pyproject.toml miniapp/package.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "release: prepare ChatPulse 0.12.0"
          git push origin HEAD:feat/achievements-showcase-v3
