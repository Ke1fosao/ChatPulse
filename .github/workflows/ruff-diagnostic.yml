name: Ruff diagnostic

on:
  pull_request:

permissions:
  contents: write

jobs:
  diagnose:
    if: github.event.pull_request.head.ref == 'feat/owner-revenue'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -q ruff
      - run: ruff check . > ruff-diagnostic.txt 2>&1 || true
      - name: Commit diagnostic
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add ruff-diagnostic.txt
          git commit -m 'chore: capture Ruff diagnostic'
          git push origin HEAD:${{ github.head_ref }}
