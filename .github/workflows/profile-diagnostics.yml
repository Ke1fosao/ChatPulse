name: Profile Backend Autoformat

on:
  push:
    branches:
      - feat/profile-levels-share-v06
    paths:
      - .github/workflows/profile-diagnostics.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/profile-levels-share-v06
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply Ruff formatting
        run: |
          pip install -q ruff
          ruff check --fix app/services/gamification.py app/services/profile_cards.py
          ruff format app/services/gamification.py app/services/profile_cards.py
      - name: Commit formatted files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/services/gamification.py app/services/profile_cards.py
          git commit -m "style: format profile level backend" || exit 0
          git push origin HEAD:feat/profile-levels-share-v06
