name: Group Settings Format

on:
  push:
    branches:
      - feat/group-settings-ux
    paths:
      - .github/workflows/group-settings-format.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/group-settings-ux
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply Ruff
        run: |
          pip install -q ruff
          ruff check --fix app/bot/keyboards_settings.py app/bot/routers/settings.py app/api/miniapp/routes.py tests/test_settings.py
          ruff format app/bot/keyboards_settings.py app/bot/routers/settings.py app/api/miniapp/routes.py tests/test_settings.py
      - name: Commit formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/bot/keyboards_settings.py app/bot/routers/settings.py app/api/miniapp/routes.py tests/test_settings.py
          git commit -m "style: format group settings implementation" || exit 0
          git push origin HEAD:feat/group-settings-ux
