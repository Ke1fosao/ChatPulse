name: Verified Owner Revenue merge

on:
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  verify-and-merge:
    if: github.event.pull_request.head.ref == 'feat/owner-revenue'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Wait for patch and verification workflows
        run: |
          for file in \
            .github/workflows/owner-revenue-patch.yml \
            .github/workflows/owner-revenue-safety-patch.yml \
            .github/workflows/owner-revenue-release-gate.yml \
            .github/workflows/owner-revenue-final-gate.yml; do
            if [ -f "$file" ]; then
              echo "Waiting for $file"
              exit 1
            fi
          done
          test -f docs/superpowers/verification/2026-07-23-owner-revenue-0.9.0.md
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -q -e '.[dev]'
      - name: Verify backend
        run: |
          ruff check .
          ruff format --check .
          pytest -q
          python -m compileall app
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: miniapp/package.json
      - name: Verify frontend
        working-directory: miniapp
        run: |
          npm install --no-audit --no-fund
          npm test -- --run
          npm run typecheck
          npm run build
      - name: Verify production Docker image
        run: docker build -t chatpulse-owner-revenue:0.9.0 .
      - name: Remove one-time merge workflow
        run: |
          rm .github/workflows/owner-revenue-verified-merge.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m 'chore: finalize Owner Revenue release'
          git push origin HEAD:${{ github.head_ref }}
      - name: Update pull request
        run: |
          cat > /tmp/pr-body.md <<'EOF'
          ## ChatPulse Owner Revenue 0.9.0

          ### Founder payments workspace
          - protected `Оплати` tab inside Owner Panel;
          - Stars today, 7 days, 30 days and all time;
          - MRR, ARPPU, active subscriptions, paid/gifted VIP and upcoming expirations;
          - trial preview → invoice → paid → full-price conversion;
          - daily revenue/refund timeline and plan distribution;
          - searchable and filterable transaction history;
          - transaction detail with complete user payment history;
          - CSV export matching active filters;
          - private owner notes protected by RLS.

          ### Financial controls
          - cancel or restore Telegram Stars auto-renewal;
          - refund only the latest active paid entitlement;
          - refunds are blocked when a later payment or owner-granted VIP exists;
          - Telegram side effect occurs before local mutation;
          - local-sync failures become `refund_required`;
          - every financial mutation is written to Owner audit.

          ### Database
          Migration `add_owner_payment_notes` was applied to production Supabase and RLS was verified.

          ### Verification
          The one-time release gate passed Ruff, Ruff format, pytest, compileall, Vitest, TypeScript, Vite production build and Docker production build before merge.
          EOF
          gh pr edit 16 --repo Ke1fosao/ChatPulse --title 'feat: add Owner Revenue analytics' --body-file /tmp/pr-body.md
          gh pr ready 16 --repo Ke1fosao/ChatPulse || true
      - name: Squash merge verified release
        run: gh pr merge 16 --repo Ke1fosao/ChatPulse --squash --admin --subject 'feat: add Owner Revenue analytics' --body 'Ship ChatPulse 0.9.0 with protected Stars analytics, transaction management, notes, safe refunds and subscription controls.'
