name: Pytest diagnostics

on:
  pull_request:

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -q -e ".[dev]"
      - name: Capture pytest output
        run: pytest -q > pytest.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: pytest-diagnostics
          path: pytest.txt
