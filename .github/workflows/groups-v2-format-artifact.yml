name: One-time Groups 2.0 formatter

on:
  push:
    branches:
      - feat/groups-2-backend
    paths:
      - .github/workflows/groups-v2-format-artifact.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/groups-2-backend
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -q ruff
      - run: ruff format app tests
      - name: Commit formatted files and remove formatter
        run: |
          rm .github/workflows/groups-v2-format-artifact.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "style: format Groups 2.0 backend"
          git push
