name: Achievement Progress Patch

on:
  push:
    branches:
      - fix/achievement-progress-badges
    paths:
      - .github/workflows/achievement-progress-patch.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/achievement-progress-badges
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Patch serializer
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("app/achievements/catalog.py")
          content = path.read_text()
          old = '''        locked_secret = self.hidden and not earned
          return {
'''
          new = '''        locked_secret = self.hidden and not earned
          safe_progress = max(progress, 0)
          if locked_secret:
              public_progress = 0
          elif self.comparator == "lte":
              public_progress = safe_progress
          else:
              public_progress = min(safe_progress, self.threshold)

          return {
'''
          if old not in content:
              raise SystemExit("serializer prelude not found")
          content = content.replace(old, new, 1)
          old_progress = '''            "progress": 0 if locked_secret else min(max(progress, 0), self.threshold),
              "threshold": 0 if locked_secret else self.threshold,
'''
          new_progress = '''            "progress": public_progress,
              "threshold": 0 if locked_secret else self.threshold,
              "comparator": self.comparator,
'''
          if old_progress not in content:
              raise SystemExit("serializer progress block not found")
          path.write_text(content.replace(old_progress, new_progress, 1))
          PY
          pip install -q ruff
          ruff check --fix app/achievements/catalog.py
          ruff format app/achievements/catalog.py
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/achievements/catalog.py
          git commit -m "fix: preserve inverse achievement progress" || exit 0
          git push origin HEAD:fix/achievement-progress-badges
