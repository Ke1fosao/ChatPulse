name: Profile Diagnostics

on:
  push:
    branches:
      - feat/profile-levels-sharing
    paths:
      - .github/workflows/profile-autoformat.yml

permissions:
  contents: write

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/profile-levels-sharing
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Capture Vitest output
        working-directory: miniapp
        shell: bash
        run: |
          npm install --no-audit --no-fund
          set +e
          npm test -- --run > ../profile-frontend-test.log 2>&1
          exit 0
      - name: Commit diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile-frontend-test.log
          git commit -m "test: capture profile frontend failure" || exit 0
          git push origin HEAD:feat/profile-levels-sharing
