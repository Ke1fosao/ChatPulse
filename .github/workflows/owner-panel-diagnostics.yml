name: Owner Panel Autoformat

on:
  push:
    branches:
      - feat/owner-panel-vip
    paths:
      - .github/workflows/owner-panel-diagnostics.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/owner-panel-vip
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Format backend
        run: |
          pip install -q ruff
          ruff check --fix app/repositories/owner_panel.py
          ruff format app/repositories/owner_panel.py
      - name: Refresh frontend lockfile
        working-directory: miniapp
        run: npm install --no-audit --no-fund
      - name: Commit formatted release files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/repositories/owner_panel.py miniapp/package-lock.json
          git commit -m "style: format owner panel release files" || exit 0
          git push origin HEAD:feat/owner-panel-vip
