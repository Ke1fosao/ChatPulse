name: Owner User Control Diagnostics

on:
  push:
    branches:
      - feature/owner-user-control-clean
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/owner-user-control-clean
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: miniapp/package-lock.json
      - name: Install backend
        run: pip install -q -e ".[dev]"
      - name: Install frontend
        working-directory: miniapp
        run: npm install --no-audit --no-fund
      - name: Fix role-removal reason field
        shell: python
        run: |
          from pathlib import Path

          path = Path("miniapp/src/owner/OwnerUserDrawer.tsx")
          content = path.read_text()
          old = '(["vip", "block", "xp"] as Action[]).includes(action)'
          new = '(["vip", "block", "xp", "role"] as Action[]).includes(action)'
          if old not in content and new not in content:
              raise SystemExit("OwnerUserDrawer reason condition not found")
          path.write_text(content.replace(old, new))
      - name: Format and lint backend
        run: |
          ruff check . --fix
          ruff format .
          ruff check .
          ruff format --check .
      - name: Commit final formatting
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "style: finalize owner user control"
          git push origin HEAD:feature/owner-user-control-clean
      - name: Backend tests
        run: |
          pytest -q
          python -m compileall app
      - name: Frontend verification
        working-directory: miniapp
        run: |
          npm test -- --run
          npm run typecheck
          npm run build
