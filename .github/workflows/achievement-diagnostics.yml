name: Achievement diagnostics

on:
  pull_request:
    branches: [main]

jobs:
  frontend-diagnostics:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: miniapp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: miniapp/package-lock.json
      - run: npm install --no-audit --no-fund
      - name: Capture frontend diagnostics
        shell: bash
        run: |
          npm test -- --run > ../frontend-tests.log 2>&1 || true
          npm run typecheck > ../frontend-typecheck.log 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: achievement-frontend-diagnostics
          path: |
            frontend-tests.log
            frontend-typecheck.log

  backend-diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -q -e ".[dev]"
      - name: Capture backend diagnostics
        shell: bash
        run: |
          ruff check . > backend-ruff.log 2>&1 || true
          ruff format --check . > backend-format.log 2>&1 || true
          pytest -q > backend-pytest.log 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: achievement-backend-diagnostics
          path: |
            backend-ruff.log
            backend-format.log
            backend-pytest.log
