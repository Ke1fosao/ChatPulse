name: Complete structure refactor

on:
  push:
    branches:
      - refactor/complete-structure-plan

permissions:
  contents: write

jobs:
  generate-and-verify:
    if: ${{ !contains(github.event.head_commit.message, '[generated refactor]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/complete-structure-plan
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: miniapp/package.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Generate refactor
        run: python scripts/complete_structure_refactor.py
      - name: Verify frontend
        working-directory: miniapp
        run: |
          npm install --no-audit --no-fund
          npm test -- --run
          npm run typecheck
          npm run build
      - name: Verify backend
        run: |
          pip install -q -e ".[dev]"
          ruff check .
          ruff format --check .
          pytest -q
          python -m compileall app
      - name: Commit generated refactor
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "refactor: complete structure plan [generated refactor]"
          git push origin HEAD:refactor/complete-structure-plan
