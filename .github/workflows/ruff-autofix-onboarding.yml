name: One-time onboarding Ruff autofix

on:
  push:
    branches:
      - feat/onboarding-retention
    paths:
      - .github/workflows/ruff-autofix-onboarding.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/onboarding-retention
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -q ruff
      - run: ruff check . --fix
      - run: ruff format app tests
      - name: Commit formatted files and remove workflow
        run: |
          rm .github/workflows/ruff-autofix-onboarding.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "style: format onboarding and retention code"
          git push
