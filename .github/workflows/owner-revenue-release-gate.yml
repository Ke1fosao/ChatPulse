name: Owner Revenue release gate

on:
  pull_request:

permissions:
  contents: write

jobs:
  verify:
    if: github.event.pull_request.head.ref == 'feat/owner-revenue'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Wait for metrics patch
        run: |
          if [ -f .github/workflows/owner-revenue-patch.yml ]; then
            echo "Owner Revenue metrics patch is still pending"
            exit 1
          fi
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -q -e '.[dev]'
      - name: Backend verification
        run: |
          ruff check .
          ruff format --check .
          pytest -q | tee /tmp/pytest.txt
          python -m compileall app
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: miniapp/package.json
      - name: Frontend verification
        working-directory: miniapp
        run: |
          npm install --no-audit --no-fund
          npm test -- --run | tee /tmp/vitest.txt
          npm run typecheck
          npm run build
      - name: Production Docker build
        run: docker build -t chatpulse-owner-revenue:0.9.0 .
      - name: Persist verification evidence
        run: |
          mkdir -p docs/superpowers/verification
          cat > docs/superpowers/verification/2026-07-23-owner-revenue-0.9.0.md <<EOF
          # Owner Revenue 0.9.0 Verification

          Verified on commit: \`${GITHUB_SHA}\`

          - Ruff check: passed
          - Ruff format check: passed
          - Pytest: passed
          - Python compileall: passed
          - Vitest: passed
          - TypeScript typecheck: passed
          - Vite production build: passed
          - Docker production build: passed

          This file was generated only after every command above exited successfully.
          EOF
          rm .github/workflows/owner-revenue-release-gate.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m 'verify: Owner Revenue 0.9.0 release gate'
          git push origin HEAD:${{ github.head_ref }}
