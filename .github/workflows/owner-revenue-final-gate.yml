name: Final Owner Revenue release gate

on:
  pull_request:

permissions:
  contents: write

jobs:
  verify:
    if: github.event.pull_request.head.ref == 'feat/owner-revenue'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Wait for all temporary patch workflows
        run: |
          for file in \
            .github/workflows/owner-revenue-patch.yml \
            .github/workflows/owner-revenue-safety-patch.yml \
            .github/workflows/owner-revenue-release-gate.yml; do
            if [ -f "$file" ]; then
              echo "Waiting for $file"
              exit 1
            fi
          done
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -q -e '.[dev]'
      - name: Backend release checks
        run: |
          ruff check .
          ruff format --check .
          pytest -q
          python -m compileall app
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: miniapp/package.json
      - name: Frontend release checks
        working-directory: miniapp
        run: |
          npm install --no-audit --no-fund
          npm test -- --run
          npm run typecheck
          npm run build
      - name: Production Docker build
        run: docker build -t chatpulse-owner-revenue:0.9.0 .
      - name: Persist release evidence
        run: |
          mkdir -p docs/superpowers/verification
          cat > docs/superpowers/verification/2026-07-23-owner-revenue-0.9.0.md <<EOF
          # Owner Revenue 0.9.0 Verification

          Verified source commit: \`${GITHUB_SHA}\`

          - Ruff check: passed
          - Ruff format check: passed
          - Pytest: passed
          - Python compileall: passed
          - Vitest: passed
          - TypeScript typecheck: passed
          - Vite production build: passed
          - Docker production build: passed

          This report is committed only after every release command exits successfully.
          EOF
          rm .github/workflows/owner-revenue-final-gate.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m 'verify: Owner Revenue 0.9.0 release gate'
          git push origin HEAD:${{ github.head_ref }}
