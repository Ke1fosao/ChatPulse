name: Finalize refund synchronization safety

on:
  pull_request:

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'feat/owner-revenue'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Wait for metrics patch
        run: |
          if [ -f .github/workflows/owner-revenue-patch.yml ]; then
            echo 'Metrics patch pending'
            exit 1
          fi
      - name: Patch refund local-sync fallback
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('app/services/owner_payments.py')
          text = path.read_text()
          old = '''        result = await self._revenue.apply_refund(\n            payment_id,\n            reason=normalized_reason,\n            now=current,\n        )\n        await self._audit(\n'''
          new = '''        try:\n            result = await self._revenue.apply_refund(\n                payment_id,\n                reason=normalized_reason,\n                now=current,\n            )\n        except Exception as error:\n            await self._billing.mark_refund_required(\n                eligibility["charge_id"],\n                reason=f"owner_refund_local_sync_failed:{type(error).__name__}",\n            )\n            await self._audit(\n                owner_user_id,\n                "payment.refund_failed",\n                payment_id,\n                {"stage": "local_sync", "error_type": type(error).__name__},\n                current,\n            )\n            raise RuntimeError(\n                "Stars повернено, але локальний статус потребує синхронізації."\n            ) from error\n        await self._audit(\n'''
          if old not in text:
              raise SystemExit('refund marker not found')
          path.write_text(text.replace(old, new))
          PY
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -q ruff
      - run: ruff format app tests
      - name: Remove workflow and commit
        run: |
          rm .github/workflows/owner-revenue-safety-patch.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m 'fix: preserve refund state after local sync failure'
          git push origin HEAD:${{ github.head_ref }}
