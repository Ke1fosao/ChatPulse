name: Pytest diagnostic once

on:
  push:
    branches: [feat/owner-revenue]

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -q -e '.[dev]'
      - run: pytest -q > pytest-diagnostic.txt 2>&1 || true
      - name: Commit diagnostic and remove workflow
        run: |
          rm .github/workflows/pytest-diagnostic-once.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add pytest-diagnostic.txt .github/workflows/pytest-diagnostic-once.yml
          git commit -m 'chore: capture pytest diagnostic'
          git push
