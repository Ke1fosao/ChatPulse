name: Final verified Owner Revenue merge

on:
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  verify-and-merge:
    if: github.event.pull_request.head.ref == 'feat/owner-revenue'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Wait for cleanup commit
        run: |
          test ! -f .github/workflows/owner-revenue-cleanup-fix.yml
          for file in .github/workflows/owner-revenue-patch.yml .github/workflows/owner-revenue-safety-patch.yml .github/workflows/owner-revenue-release-gate.yml .github/workflows/owner-revenue-final-gate.yml .github/workflows/owner-revenue-verified-merge.yml; do
            test ! -f "$file"
          done
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -q -e '.[dev]'
      - name: Backend release gate
        run: |
          ruff check .
          ruff format --check .
          pytest -q
          python -m compileall app
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: miniapp/package.json
      - name: Frontend release gate
        working-directory: miniapp
        run: |
          npm install --no-audit --no-fund
          npm test -- --run
          npm run typecheck
          npm run build
      - name: Docker release gate
        run: docker build -t chatpulse-owner-revenue:0.9.0 .
      - name: Commit verification report and remove gate
        run: |
          mkdir -p docs/superpowers/verification
          cat > docs/superpowers/verification/2026-07-23-owner-revenue-0.9.0.md <<EOF
          # Owner Revenue 0.9.0 Verification

          Verified source commit: \`${GITHUB_SHA}\`

          - Ruff check: passed
          - Ruff format check: passed
          - Pytest: passed
          - Python compileall: passed
          - Vitest: passed
          - TypeScript typecheck: passed
          - Vite production build: passed
          - Docker production build: passed

          This report was generated only after every release command exited successfully.
          EOF
          rm .github/workflows/owner-revenue-verified-merge-v2.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m 'verify: Owner Revenue 0.9.0 release gate'
          git push origin HEAD:${{ github.head_ref }}
      - name: Publish PR summary
        run: |
          cat > /tmp/pr-body.md <<'EOF'
          ## ChatPulse Owner Revenue 0.9.0

          ### Founder dashboard
          - protected `Оплати` tab in Owner Panel;
          - Stars today, 7 days, 30 days and all time;
          - MRR, ARPPU, paid/gifted VIP, active subscriptions and upcoming expirations;
          - contextual preview → trial invoice → trial paid → full-price conversion;
          - daily gross/refund/net timeline and plan distribution;
          - searchable/filterable transactions and matching CSV export;
          - private owner notes protected by RLS.

          ### Financial controls
          - transaction detail and full user payment history;
          - cancel or restore Telegram Stars auto-renewal;
          - refund only the latest active paid entitlement;
          - block refund when a later purchase or owner gift exists;
          - mark `refund_required` when Telegram succeeds but local synchronization fails;
          - audit every note, subscription mutation and refund stage.

          ### Database
          Migration `add_owner_payment_notes` was applied to production Supabase and RLS was verified.

          ### Verification
          Ruff, Ruff format, pytest, compileall, Vitest, TypeScript, Vite production build and Docker build passed in the final one-time release gate before merge.
          EOF
          gh pr edit 16 --repo Ke1fosao/ChatPulse --title 'feat: add Owner Revenue analytics' --body-file /tmp/pr-body.md
          gh pr ready 16 --repo Ke1fosao/ChatPulse || true
      - name: Squash merge release
        run: gh pr merge 16 --repo Ke1fosao/ChatPulse --squash --admin --subject 'feat: add Owner Revenue analytics' --body 'Ship ChatPulse 0.9.0 with protected Stars analytics, transactions, notes, safe refunds and subscription controls.'
