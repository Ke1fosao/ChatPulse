name: Ruff diagnostics

on:
  pull_request:

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -q ruff
      - name: Capture Ruff output
        run: ruff check . > ruff.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: ruff-diagnostics
          path: ruff.txt
