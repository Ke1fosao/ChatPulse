name: Final backend diagnostics

on:
  pull_request:
    branches: [main]

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -q -e ".[dev]"
      - name: Capture pytest output
        run: pytest -q > final-backend-pytest.log 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: final-backend-pytest
          path: final-backend-pytest.log
