name: Ruff fix owner

on:
  pull_request:

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.ref == 'feat/owner-revenue'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -q ruff
      - run: ruff check . --fix
      - run: ruff format app tests
      - name: Cleanup and commit
        run: |
          rm -f .github/workflows/ruff-fix-owner.yml .github/workflows/ruff-diagnostic.yml ruff-diagnostic.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m 'fix: apply Ruff cleanup'
          git push origin HEAD:${{ github.head_ref }}
