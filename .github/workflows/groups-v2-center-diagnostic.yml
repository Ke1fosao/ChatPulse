name: One-time Groups 2.0 center diagnostic

on:
  push:
    branches:
      - feat/groups-2-center
    paths:
      - .github/workflows/groups-v2-center-diagnostic.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/groups-2-center
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: cd miniapp && npm install --no-audit --no-fund
      - name: Capture frontend diagnostics
        run: |
          (cd miniapp && npm test -- --run) > groups-v2-center-test.txt 2>&1 || true
          (cd miniapp && npm run typecheck) > groups-v2-center-typecheck.txt 2>&1 || true
      - name: Commit diagnostics and remove workflow
        run: |
          rm .github/workflows/groups-v2-center-diagnostic.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add groups-v2-center-test.txt groups-v2-center-typecheck.txt .github/workflows/groups-v2-center-diagnostic.yml
          git commit -m "chore: capture Groups 2.0 center diagnostics"
          git push
