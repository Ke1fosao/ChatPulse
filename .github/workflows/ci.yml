name: CI

on:
  pull_request:

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install frontend dependencies
        working-directory: miniapp
        run: npm install --no-audit --no-fund >/dev/null 2>&1
      - name: Install Ruff
        run: pip install -q ruff
      - name: Capture diagnostics
        run: |
          mkdir -p diagnostics
          (cd miniapp && npm run typecheck) > diagnostics/typecheck.txt 2>&1 || true
          ruff format --check --diff . > diagnostics/ruff-format.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: onboarding-diagnostics
          path: diagnostics
