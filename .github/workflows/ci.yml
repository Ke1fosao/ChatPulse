name: Finalize Mini App formatting

on:
  push:
    branches: [feat/miniapp-dashboard]

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/miniapp-dashboard
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -q -e ".[dev]"
      - name: Patch long local Mini App message
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("app/main.py")
          content = path.read_text()
          content = content.replace(
              '                "Frontend build відсутній у локальному backend-only режимі.</p></main></body></html>",',
              '                "Frontend build відсутній у локальному backend-only "\n'
              '                "режимі.</p></main></body></html>",',
          )
          path.write_text(content)
          PY
      - run: ruff check --fix .
      - run: ruff format .
      - name: Restore final CI
        shell: bash
        run: |
          cat > .github/workflows/ci.yml <<'YAML'
          name: CI

          on:
            push:
            pull_request:

          jobs:
            frontend:
              runs-on: ubuntu-latest
              defaults:
                run:
                  working-directory: miniapp
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-node@v4
                  with:
                    node-version: "22"
                    cache: npm
                    cache-dependency-path: miniapp/package.json
                - run: npm install --no-audit --no-fund
                - run: npm test -- --run
                - run: npm run typecheck
                - run: npm run build

            backend:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-python@v5
                  with:
                    python-version: "3.12"
                    cache: pip
                - run: pip install -q -e ".[dev]"
                - run: ruff check .
                - run: ruff format --check .
                - run: pytest -q
                - run: python -m compileall app

            docker:
              runs-on: ubuntu-latest
              needs: [frontend, backend]
              steps:
                - uses: actions/checkout@v4
                - run: docker build -t chatpulse-miniapp:test .
          YAML
          sed -i 's/^          //' .github/workflows/ci.yml
      - name: Commit final formatting
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "style: finalize Mini App implementation"
          git push origin HEAD:feat/miniapp-dashboard
