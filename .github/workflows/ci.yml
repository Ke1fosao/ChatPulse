name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -q -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .
      - name: Run tests
        id: pytest
        shell: bash
        run: |
          set +e
          pytest -q --tb=short > pytest.log 2>&1
          code=$?
          cat pytest.log
          exit $code
      - name: Upload pytest diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-diagnostics
          path: pytest.log
      - run: python -m compileall app
