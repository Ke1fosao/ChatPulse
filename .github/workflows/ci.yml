name: Format Mini App backend

on:
  push:
    branches: [feat/miniapp-dashboard]

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/miniapp-dashboard
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -q -e ".[dev]"
      - run: ruff check --fix .
      - run: ruff format .
      - name: Commit formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "style: format Mini App backend"
          git push origin HEAD:feat/miniapp-dashboard
