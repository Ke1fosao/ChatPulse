name: CI

on:
  push:
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: miniapp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: miniapp/package.json
      - run: npm install --no-audit --no-fund
      - name: Run frontend tests
        id: frontend_tests
        shell: bash
        run: |
          set +e
          npm test -- --run > ../frontend-test.log 2>&1
          status=$?
          tail -n 160 ../frontend-test.log
          exit $status
      - name: Upload frontend test log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-log
          path: frontend-test.log
      - run: npm run typecheck
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -q -e ".[dev]"
      - name: Run backend lint
        shell: bash
        run: |
          set +e
          ruff check . > backend-lint.log 2>&1
          status=$?
          cat backend-lint.log
          exit $status
      - name: Upload backend lint log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-lint-log
          path: backend-lint.log
      - run: ruff format --check .
      - name: Run backend tests
        shell: bash
        run: |
          set +e
          pytest -q > backend-test.log 2>&1
          status=$?
          tail -n 240 backend-test.log
          exit $status
      - name: Upload backend test log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-log
          path: backend-test.log
      - run: python -m compileall app

  docker:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t chatpulse-miniapp:test .
