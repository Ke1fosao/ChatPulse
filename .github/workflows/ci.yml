name: Export formatted Mini App backend

on:
  push:
    branches: [feat/miniapp-dashboard]
  pull_request:
    branches: [main]

jobs:
  format:
    if: github.head_ref == 'feat/miniapp-dashboard' || github.ref == 'refs/heads/feat/miniapp-dashboard'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/miniapp-dashboard
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -q -e ".[dev]"
      - name: Format backend tree
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("app/main.py")
          content = path.read_text()
          content = content.replace(
              '                "Frontend build відсутній у локальному backend-only режимі.</p></main></body></html>",',
              '                "Frontend build відсутній у локальному backend-only "\n'
              '                "режимі.</p></main></body></html>",',
          )
          path.write_text(content)
          PY
          ruff check --fix . || true
          ruff format .
          git diff --name-only > formatted-files.txt
          tar -czf formatted-backend.tar.gz app tests pyproject.toml formatted-files.txt
      - uses: actions/upload-artifact@v4
        with:
          name: formatted-backend
          path: formatted-backend.tar.gz
