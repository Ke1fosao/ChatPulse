name: Apply compatibility fix

on:
  push:
    branches: [feat/gamification-v3]

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/gamification-v3
      - name: Patch handler and restore CI
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("app/bot/routers/groups.py")
          content = path.read_text()
          content = content.replace(
              "    gamification_repository: GamificationRepository,\n"
              "    default_timezone: str,\n"
              "    fingerprint_secret: str,\n"
              ") -> None:\n",
              "    default_timezone: str,\n"
              "    gamification_repository: GamificationRepository | None = None,\n"
              "    fingerprint_secret: str | None = None,\n"
              ") -> None:\n",
              1,
          )
          content = content.replace(
              "    if not tracked:\n"
              "        return\n"
              "    update = await gamification_repository.award_message_xp(\n",
              "    if not tracked or gamification_repository is None:\n"
              "        return\n"
              "    update = await gamification_repository.award_message_xp(\n",
              1,
          )
          path.write_text(content)

          Path(".github/workflows/ci.yml").write_text('''name: CI

          on:
            push:
            pull_request:

          jobs:
            test:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-python@v5
                  with:
                    python-version: "3.12"
                    cache: pip
                - run: pip install -q -e ".[dev]"
                - run: ruff check .
                - run: ruff format --check .
                - run: pytest -q
                - run: python -m compileall app
          '''.replace("          ", ""))
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/bot/routers/groups.py .github/workflows/ci.yml
          git commit -m "fix: keep direct group handler calls compatible"
          git push origin HEAD:feat/gamification-v3
