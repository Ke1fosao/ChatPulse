name: CI

on:
  pull_request:

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: pip install -q -e ".[dev]"
      - name: Capture pytest diagnostics
        run: |
          mkdir -p diagnostics
          pytest -q > diagnostics/pytest.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: onboarding-pytest-diagnostics
          path: diagnostics
