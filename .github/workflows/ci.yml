name: CI

on:
  push:
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: miniapp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: miniapp/package.json
      - run: npm install --no-audit --no-fund
      - run: npm test -- --run
      - run: npm run typecheck
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -q -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .
      - run: pytest -q
      - run: python -m compileall app
