name: Apply Mini App backend patch

on:
  push:
    branches: [feat/miniapp-dashboard]

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/miniapp-dashboard
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -q -e ".[dev]"
      - name: Patch repository settings and restore CI
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          activity = Path("app/repositories/activity.py")
          content = activity.read_text()
          content = content.replace(
              '            "report_hour",\n            "track_messages",',
              '            "report_hour",\n'
              '            "report_minute",\n'
              '            "report_card_theme",\n'
              '            "track_messages",',
          )
          content = content.replace(
              '            "report_minute": group.report_minute,\n'
              '            "track_messages": group.track_messages,',
              '            "report_minute": group.report_minute,\n'
              '            "report_card_theme": group.report_card_theme,\n'
              '            "track_messages": group.track_messages,',
          )
          activity.write_text(content)

          health = Path("tests/test_health.py")
          health.write_text(health.read_text().replace('"version": "0.3.0"', '"version": "0.4.0"'))

          Path(".github/workflows/ci.yml").write_text('''name: CI

          on:
            push:
            pull_request:

          jobs:
            test:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-python@v5
                  with:
                    python-version: "3.12"
                    cache: pip
                - run: pip install -q -e ".[dev]"
                - run: ruff check .
                - run: ruff format --check .
                - run: pytest -q
                - run: python -m compileall app
          '''.replace("          ", ""))
          PY
      - run: ruff check --fix .
      - run: ruff format .
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "fix: complete Mini App backend integration"
          git push origin HEAD:feat/miniapp-dashboard
