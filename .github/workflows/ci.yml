name: Commit formatted Mini App backend

on:
  push:
    branches: [feat/miniapp-dashboard]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  format:
    if: github.head_ref == 'feat/miniapp-dashboard' || github.ref == 'refs/heads/feat/miniapp-dashboard'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/miniapp-dashboard
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -q -e ".[dev]"
      - name: Format backend tree
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("app/main.py")
          content = path.read_text()
          content = content.replace(
              '                "Frontend build відсутній у локальному backend-only режимі.</p></main></body></html>",',
              '                "Frontend build відсутній у локальному backend-only "\n'
              '                "режимі.</p></main></body></html>",',
          )
          path.write_text(content)
          PY
          ruff check --fix . || true
          ruff format .
      - name: Commit formatted Python files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app tests
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "style: format Mini App backend"
          git push origin HEAD:feat/miniapp-dashboard
