name: CI

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  format-fix:
    if: github.event_name == 'push' && github.ref == 'refs/heads/feat/gamification-v3'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/gamification-v3
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -q -e ".[dev]"
      - run: ruff format .
      - name: Commit formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "style: format gamification v3"
          git push origin HEAD:feat/gamification-v3

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -q -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .
      - run: pytest -q
      - run: python -m compileall app
