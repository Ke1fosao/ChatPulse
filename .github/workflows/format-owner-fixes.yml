name: Format owner fixes

on:
  pull_request:

permissions:
  contents: write

jobs:
  format:
    if: github.event.pull_request.head.ref == 'feat/owner-revenue'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -q ruff
      - run: ruff format app tests
      - name: Commit formatted files and remove workflow
        run: |
          rm .github/workflows/format-owner-fixes.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app tests .github/workflows/format-owner-fixes.yml
          git commit -m 'style: format owner fixes'
          git push origin HEAD:${{ github.head_ref }}
