name: Achievement Final Format

on:
  push:
    branches:
      - feat/achievement-system-v2
    paths:
      - .github/workflows/achievement-format.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/achievement-format.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/achievement-system-v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Format all changed Python files
        run: |
          pip install -q ruff
          FILES="app/achievement_models.py app/achievements app/api/internal_achievements.py app/api/miniapp/routes.py app/bot/setup.py app/database.py app/main.py app/repositories/achievements.py app/repositories/gamification_v2.py app/repositories/miniapp_v2.py app/services/achievement_backfill.py app/services/achievement_cards.py app/services/weekly_reports.py tests/test_achievement_backfill.py tests/test_achievement_engine_v2.py tests/test_achievement_repository_v2.py tests/test_miniapp_achievement_events.py"
          ruff check --fix $FILES
          ruff format $FILES
      - name: Commit formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/achievement_models.py app/achievements app/api/internal_achievements.py app/api/miniapp/routes.py app/bot/setup.py app/database.py app/main.py app/repositories/achievements.py app/repositories/gamification_v2.py app/repositories/miniapp_v2.py app/services/achievement_backfill.py app/services/achievement_cards.py app/services/weekly_reports.py tests/test_achievement_backfill.py tests/test_achievement_engine_v2.py tests/test_achievement_repository_v2.py tests/test_miniapp_achievement_events.py
          git commit -m "style: format achievement system v2" || exit 0
          git push origin HEAD:feat/achievement-system-v2
