name: Achievement V2 Format

on:
  push:
    branches:
      - feat/achievement-system-v2
    paths:
      - .github/workflows/achievement-format.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/achievement-system-v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply Ruff fixes
        run: |
          pip install -q ruff
          ruff check --fix app/achievements app/achievement_models.py app/database.py app/repositories/achievements.py app/repositories/gamification_v2.py app/repositories/miniapp_v2.py app/api/miniapp/routes.py app/main.py tests/test_achievement_engine_v2.py tests/test_achievement_repository_v2.py tests/test_miniapp_achievement_events.py
          ruff format app/achievements app/achievement_models.py app/database.py app/repositories/achievements.py app/repositories/gamification_v2.py app/repositories/miniapp_v2.py app/api/miniapp/routes.py app/main.py tests/test_achievement_engine_v2.py tests/test_achievement_repository_v2.py tests/test_miniapp_achievement_events.py
      - name: Commit formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/achievements app/achievement_models.py app/database.py app/repositories/achievements.py app/repositories/gamification_v2.py app/repositories/miniapp_v2.py app/api/miniapp/routes.py app/main.py tests/test_achievement_engine_v2.py tests/test_achievement_repository_v2.py tests/test_miniapp_achievement_events.py
          git commit -m "style: format achievement system v2" || exit 0
          git push origin HEAD:feat/achievement-system-v2
