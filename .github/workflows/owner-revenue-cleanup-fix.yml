name: Clean Owner Revenue temporary workflows

on:
  pull_request:

permissions:
  contents: write

jobs:
  cleanup:
    if: github.event.pull_request.head.ref == 'feat/owner-revenue'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Fix deterministic frontend assertion
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('miniapp/src/owner/OwnerPayments.test.tsx')
          text = path.read_text()
          text = text.replace(
              '  expect(screen.getByText("59 ⭐")).toBeInTheDocument();\n',
              '  expect(screen.getAllByText("59 ⭐").length).toBeGreaterThanOrEqual(2);\n',
          )
          path.write_text(text)
          PY
      - name: Remove all superseded one-time workflows
        run: |
          rm -f \
            .github/workflows/owner-revenue-patch.yml \
            .github/workflows/owner-revenue-safety-patch.yml \
            .github/workflows/owner-revenue-release-gate.yml \
            .github/workflows/owner-revenue-final-gate.yml \
            .github/workflows/owner-revenue-verified-merge.yml \
            .github/workflows/owner-revenue-cleanup-fix.yml
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -q ruff
      - run: ruff format app tests
      - name: Commit clean release branch
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'chore: clean Owner Revenue release branch'
          git push origin HEAD:${{ github.head_ref }}
