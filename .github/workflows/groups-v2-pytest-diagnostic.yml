name: One-time Groups 2.0 pytest diagnostic

on:
  push:
    branches:
      - feat/groups-2-backend
    paths:
      - .github/workflows/groups-v2-pytest-diagnostic.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/groups-2-backend
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -q -e ".[dev]"
      - name: Capture pytest output
        run: pytest -q > groups-v2-pytest.txt 2>&1 || true
      - name: Commit diagnostic and remove workflow
        run: |
          rm .github/workflows/groups-v2-pytest-diagnostic.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add groups-v2-pytest.txt .github/workflows/groups-v2-pytest-diagnostic.yml
          git commit -m "chore: capture Groups 2.0 pytest output"
          git push
