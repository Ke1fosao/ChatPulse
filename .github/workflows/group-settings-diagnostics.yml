name: Group Settings Diagnostics

on:
  push:
    branches:
      - feat/group-settings-ux
    paths:
      - .github/workflows/group-settings-diagnostics.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/group-settings-diagnostics.yml

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/group-settings-ux
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Capture backend output
        shell: bash
        run: |
          pip install -q -e ".[dev]"
          set +e
          ruff check . > backend-diagnostics.log 2>&1
          ruff format --check . >> backend-diagnostics.log 2>&1
          exit 0
      - name: Capture frontend output
        working-directory: miniapp
        shell: bash
        run: |
          npm install --no-audit --no-fund
          set +e
          npm test -- --run > ../frontend-diagnostics.log 2>&1
          npm run typecheck >> ../frontend-diagnostics.log 2>&1
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: group-settings-diagnostics
          path: |
            backend-diagnostics.log
            frontend-diagnostics.log
