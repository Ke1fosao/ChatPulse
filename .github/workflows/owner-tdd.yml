name: Owner claim TDD

on:
  pull_request:

jobs:
  owner-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -q -e ".[dev]"
      - run: pytest -q tests/test_owner_repository.py tests/test_owner_access.py tests/test_claimadmin_command.py
