name: Owner claim TDD

on:
  pull_request:

jobs:
  owner-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -q -e ".[dev]"
      - name: Capture Ruff formatting diff
        shell: bash
        run: |
          ruff format --check --diff . > ruff-format-output.txt 2>&1 || true
      - name: Run focused owner tests
        shell: bash
        run: |
          set -o pipefail
          pytest -q tests/test_owner_repository.py tests/test_owner_access.py tests/test_claimadmin_command.py 2>&1 | tee owner-test-output.txt
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owner-diagnostics
          path: |
            owner-test-output.txt
            ruff-format-output.txt
